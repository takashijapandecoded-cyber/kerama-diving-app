name: Vercel 自動デプロイ

on:
  push:
    branches:
      - main
  workflow_dispatch:

# デプロイに書き込み権限は不要（secretsの露出面を最小に）
permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Vercel CLI インストール
        # @latest だと未検証・侵害版のCLIをsecrets付きで即実行してしまうためバージョン固定
        run: npm install -g vercel@56.3.2

      - name: Vercel に本番デプロイ＆エイリアス更新
        env:
          VERCEL_TOKEN:      ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
        run: |
          DEPLOY_URL=$(vercel deploy --prod --yes)
          echo "Deployed to: $DEPLOY_URL"
          vercel alias set "$DEPLOY_URL" kerama-diving.vercel.app
          echo "✅ kerama-diving.vercel.app に反映完了"
