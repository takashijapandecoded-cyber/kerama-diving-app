name: 毎朝5時 ダイビングコンディション通知

on:
  # cron-job.org が毎朝5時JST(UTC 20:00)に workflow_dispatch で呼び出す
  # GitHub schedule は cron-job.org と二重起動になるため削除
  workflow_dispatch:
    inputs:
      test_email:
        description: 'テスト送信先メール（省略時はTO_EMAILへ）'
        required: false
        default: ''

permissions:
  contents: write  # スコア履歴CSVを自動コミットするため（読み取りのみのreadから変更）

jobs:
  send-morning-brief:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'  # Node.js 20は2026/06/16廃止のため22に更新

      - name: 依存パッケージをインストール
        working-directory: notify
        run: npm install

      - name: 朝のサマリーをメール送信
        working-directory: notify
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_EMAIL:           ${{ secrets.TO_EMAIL }}
          TEST_EMAIL:         ${{ github.event.inputs.test_email }}
          APP_URL:            ${{ secrets.APP_URL }}
        run: node daily-brief.js

      - name: スコア履歴CSVをコミット
        working-directory: notify
        run: |
          if [ -n "$(git status --porcelain score-history.csv)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add score-history.csv
            git commit -m "記録: $(date -u +%Y-%m-%d) のスコア履歴"
            git push || echo "⚠️ push失敗（他の変更と衝突した可能性。次回に持ち越し）"
          else
            echo "スコア履歴に変更なし（DRY_RUN、または本日分は記録済み）"
          fi
